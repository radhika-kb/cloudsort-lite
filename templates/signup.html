<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">

<!-- 🔝 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">☁️ CloudSort Lite</a>

        <div>
            <a class="btn btn-light me-2" href="/login">Login</a>
            <a class="btn btn-light" href="/signup">Signup</a>
        </div>
    </div>
</nav>

<!-- 📝 Signup Form -->
<div class="container mt-5">
    <div class="card shadow p-5 text-center" style="max-width: 500px; margin:auto;">

        <h2 class="mb-4">📝 Create Account</h2>

        <form method="POST">

            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Signup
            </button>
        </form>

        <div class="mt-3">
            <p>Already have an account?</p>
            <a href="/login" class="btn btn-outline-primary">Login</a>
        </div>

    </div>
</div>

</body>
</html>
