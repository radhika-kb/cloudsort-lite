<!DOCTYPE html>
<html>
<head>
    <title>Upload File</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- 🔝 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">☁️ CloudSort Lite</a>

        <div>
            <a class="btn btn-light me-2" href="/">Home</a>
            <a class="btn btn-light me-2" href="/upload">Upload</a>
            <a class="btn btn-light" href="/dashboard">Dashboard</a>
        </div>
    </div>
</nav>

<!-- 📤 Upload Section -->
<div class="container mt-5">
    <div class="card shadow p-5 text-center">

        <h2 class="mb-4">📤 Upload File</h2>

        <form method="POST" enctype="multipart/form-data">
            
            <div class="mb-3">
                <input class="form-control" type="file" name="file" required>
            </div>

            <button type="submit" class="btn btn-success btn-lg">
                Upload File
            </button>
        </form>

        <div class="mt-4">
            <a href="/" class="btn btn-primary">⬅ Back to Home</a>
        </div>

    </div>
</div>

</body>
</html>
